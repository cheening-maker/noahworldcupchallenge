<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>世界杯射门下注 · 联机版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{--blue-deep:#0A1F8F;--blue:#1233C9;--yellow:#E8FF00;--yellow-dim:#C8DD00;--cream:#FFF8E7;--ink:#0A1656;--gold:#FFC83D;--win:#FF4D6D;
    --grass-1:#1F8A3C;--grass-2:#176E30;--c0:#0EA5E9;--c1:#EC4899;--c2:#DC2626;--c3:#10B981;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Noto Sans SC","Fredoka",system-ui,"PingFang SC",sans-serif;color:var(--cream);min-height:100vh;
    background:radial-gradient(1200px 600px at 50% -10%,#2A4BE0 0%,rgba(42,75,224,0) 60%),linear-gradient(180deg,var(--blue),var(--blue-deep));-webkit-font-smoothing:antialiased}
  .display{font-family:"Fredoka","Noto Sans SC",sans-serif}
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:90}
  .wrap{max-width:1180px;margin:0 auto;padding:18px 16px 60px}
  .hidden{display:none!important}
  h1{font-weight:900;font-size:1.5rem;text-align:center;margin:18px 0 4px}
  h1 small{display:block;font-size:.66rem;color:var(--yellow);letter-spacing:.2em;margin-top:6px;font-weight:700}
  .card{background:linear-gradient(135deg,rgba(255,255,255,.09),rgba(255,255,255,.03));border:2px solid rgba(232,255,0,.28);border-radius:20px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.22);margin-top:16px}
  .card h3{font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.05rem;margin-bottom:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .hint{font-size:.8rem;opacity:.82}
  .btn{font-family:"Fredoka","Noto Sans SC",sans-serif;font-weight:700;border:none;border-radius:14px;cursor:pointer;transition:.16s;letter-spacing:.02em}
  .btn-go{background:var(--yellow);color:var(--ink);box-shadow:0 5px 0 var(--yellow-dim);font-size:1.05rem;padding:14px 22px}
  .btn-go:hover{transform:translateY(-2px);box-shadow:0 7px 0 var(--yellow-dim)} .btn-go:active{transform:translateY(2px);box-shadow:0 3px 0 var(--yellow-dim)}
  .btn-go:disabled{opacity:.45;cursor:not-allowed;transform:none}
  .btn-ghost{background:rgba(255,255,255,.12);color:var(--cream);border:1.5px solid rgba(255,255,255,.25);padding:12px 18px;font-size:.92rem}
  .btn-ghost:hover{background:rgba(255,77,109,.22);border-color:var(--win)}
  .btn-big{width:100%;margin-top:14px}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
  .field label{font-size:.72rem;letter-spacing:.08em;opacity:.85;font-weight:700;padding-left:3px}
  .field input{font-family:inherit;font-weight:700;color:var(--ink);background:var(--cream);border:none;border-radius:12px;padding:13px 15px;outline:none;font-size:1.05rem}
  .field input:focus{box-shadow:0 0 0 3px rgba(232,255,0,.5)}
  .setrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .setrow .sw{width:16px;height:16px;border-radius:50%;flex:0 0 auto}
  .setrow input{flex:1;font-family:inherit;font-weight:700;color:var(--ink);background:var(--cream);border:none;border-radius:11px;padding:11px 13px;outline:none}
  .setrow input.num{flex:0 0 100px} .setrow label{flex:0 0 64px;font-weight:700;font-size:.85rem}
  .two-choice{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px}
  .choice{background:linear-gradient(135deg,rgba(255,255,255,.1),rgba(255,255,255,.03));border:2px solid rgba(232,255,0,.3);border-radius:20px;padding:26px 18px;text-align:center;cursor:pointer;transition:.18s}
  .choice:hover{transform:translateY(-3px);border-color:var(--yellow)}
  .choice .ic{font-size:2.4rem} .choice .t{font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.2rem;margin:8px 0 4px} .choice .d{font-size:.76rem;opacity:.8}

  /* room code */
  .roomcode{font-family:"Fredoka",sans-serif;font-weight:700;font-size:2.6rem;letter-spacing:.3em;color:var(--yellow);text-align:center;background:rgba(0,0,0,.25);border-radius:16px;padding:12px;margin:6px 0}
  #qrbox{display:flex;justify-content:center;margin:10px 0}
  #qrbox img,#qrbox canvas{background:#fff;padding:8px;border-radius:12px}
  .linkrow{display:flex;gap:8px;align-items:center;margin-top:8px}
  .linkrow input{flex:1;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.2);color:var(--cream);border-radius:10px;padding:9px 12px;font-size:.78rem}

  .plist{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;min-height:8px}
  .ptag{border:1.5px solid rgba(255,255,255,.22);background:rgba(255,255,255,.06);padding:7px 12px;border-radius:12px;font-weight:700;font-size:.85rem;display:flex;gap:7px;align-items:center}
  .ptag .bal{font-family:"Fredoka",sans-serif;font-size:.72rem;opacity:.85;background:rgba(0,0,0,.18);padding:1px 7px;border-radius:7px}
  .ptag.locked{border-color:var(--yellow)} .ptag.locked::after{content:"✓ 已锁";font-size:.66rem;color:var(--yellow)}
  .ptag.out{opacity:.5;text-decoration:line-through;border-color:rgba(255,200,61,.4);background:rgba(255,200,61,.1)}
  .ptag.out .bal{text-decoration:none;color:var(--gold)}

  .round-tag{padding:8px 16px;border-radius:14px;background:linear-gradient(135deg,rgba(255,200,61,.25),rgba(232,155,18,.1));border:1.5px solid var(--gold);font-weight:700;display:inline-block}
  .round-tag b{color:var(--gold);font-family:"Fredoka",sans-serif;font-size:1.1rem}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .chip{padding:6px 12px;border-radius:13px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,200,61,.4);font-size:.76rem;font-weight:700}
  .chip .a{color:var(--gold);font-family:"Fredoka",sans-serif} .chip.found{opacity:.5} .chip.found .a{text-decoration:line-through}
  .countdown{font-family:"Fredoka",sans-serif;font-weight:700;font-size:2.2rem;color:var(--yellow);text-align:center;line-height:1}
  .countdown.warn{color:var(--win);animation:pulse .6s infinite alternate}
  @keyframes pulse{to{transform:scale(1.06)}}

  /* pitch (host) */
  .pitch{position:relative;width:100%;aspect-ratio:16/8;border-radius:20px;overflow:hidden;margin-top:12px;
    background:repeating-linear-gradient(180deg,var(--grass-1) 0 9%,var(--grass-2) 9% 18%);border:3px solid rgba(255,255,255,.25);box-shadow:0 16px 40px rgba(0,0,0,.4)}
  .goal{position:absolute;top:3%;left:50%;transform:translateX(-50%);width:34%;height:15%;border:4px solid #fff;border-bottom:none;border-radius:6px 6px 0 0;
    background:repeating-linear-gradient(90deg,rgba(255,255,255,.12) 0 6px,transparent 6px 12px),repeating-linear-gradient(0deg,rgba(255,255,255,.12) 0 6px,transparent 6px 12px)}
  .box{position:absolute;top:3%;left:50%;transform:translateX(-50%);width:56%;height:33%;border:3px solid rgba(255,255,255,.5);border-top:none;border-radius:0 0 14px 14px}
  .keeper{position:absolute;top:6.5%;left:50%;width:42px;height:42px;margin-left:-21px;z-index:4;transition:left .5s cubic-bezier(.3,1.2,.5,1)}
  .shooter{position:absolute;bottom:6%;width:18%;display:flex;flex-direction:column;align-items:center;gap:4px;z-index:3}
  .shooter .fig{width:72px;height:auto;animation:bob 2.2s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .shooter.kicking .fig{animation:none;transform:rotate(-12deg) translateY(-4px)}
  .shooter .nameplate{font-family:"Fredoka",sans-serif;font-weight:700;font-size:.8rem;background:rgba(0,0,0,.45);padding:3px 11px;border-radius:10px;white-space:nowrap;border:1.5px solid rgba(255,255,255,.2)}
  .shooter .tally{font-size:.64rem;font-weight:700;background:rgba(0,0,0,.35);padding:1px 9px;border-radius:8px}
  .shooter.scorer .nameplate{background:var(--yellow);color:var(--ink);border-color:#fff;box-shadow:0 0 16px var(--yellow)}
  .ball{position:absolute;width:22px;height:22px;top:80%;margin-left:-11px;z-index:5;transition:top 1.2s cubic-bezier(.45,.05,.4,1),left 1.2s cubic-bezier(.45,.05,.4,1),transform 1.2s ease-out}
  .ball svg{width:100%;height:100%;filter:drop-shadow(0 3px 4px rgba(0,0,0,.4))}
  .banner{position:absolute;inset:0;display:grid;place-items:center;pointer-events:none;z-index:7}
  .banner b{font-family:"Fredoka",sans-serif;font-weight:700;font-size:clamp(2rem,6vw,4rem);color:#fff;text-shadow:0 0 30px var(--yellow),0 4px 10px rgba(0,0,0,.5);opacity:0;transform:scale(.4)}
  .banner.show b{animation:goalPop .6s cubic-bezier(.2,1.5,.4,1) forwards}
  @keyframes goalPop{to{opacity:1;transform:scale(1)}}

  /* player star allocation */
  .pstars{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:10px 0}
  .pstar{border-radius:16px;padding:12px 8px;text-align:center;border:2px solid transparent;background:rgba(0,0,0,.18)}
  .pstar .sfig{width:56px;height:auto;margin:0 auto;animation:bob 2.4s ease-in-out infinite}
  .pstar .sname{font-family:"Fredoka",sans-serif;font-weight:700;font-size:.92rem;margin:3px 0}
  .pstar .alloc{font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.8rem;line-height:1}
  .pstar .albl{font-size:.58rem;opacity:.7}
  .stepper{display:flex;gap:6px;justify-content:center;margin-top:7px}
  .stepper button{width:38px;height:38px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:1.2rem;font-family:"Fredoka",sans-serif}
  .stepper .minus{background:rgba(255,255,255,.15);color:var(--cream)} .stepper .plus{background:var(--yellow);color:var(--ink)}
  .stepper .plus5{background:rgba(232,255,0,.25);color:var(--cream);width:auto;padding:0 9px;font-size:.8rem}
  .stepper button:disabled{opacity:.3}
  .remain{text-align:center;font-weight:700;margin:4px 0} .remain b{font-family:"Fredoka",sans-serif;font-size:1.5rem;color:var(--gold)}

  .bigstatus{text-align:center;padding:24px 10px}
  .bigstatus .em{font-size:2.6rem} .bigstatus .tx{font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.3rem;margin-top:8px}
  .bigstatus .sm{opacity:.8;font-size:.86rem;margin-top:6px}

  .winners{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px}
  .wcard{flex:1 1 180px;background:linear-gradient(135deg,rgba(255,200,61,.18),rgba(255,255,255,.05));border:1.5px solid rgba(255,200,61,.4);border-radius:16px;padding:12px 16px;animation:goalPop .4s}
  .wcard .l{font-size:.68rem;letter-spacing:.1em;color:var(--yellow);font-weight:700} .wcard .n{font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.3rem;margin:3px 0} .wcard .a{color:var(--gold);font-weight:700}

  .overlay{position:fixed;inset:0;z-index:70;display:grid;place-items:center;padding:18px;background:rgba(5,15,80,.86);backdrop-filter:blur(6px)}
  .modal{width:min(560px,95vw);max-height:92vh;overflow:auto;background:linear-gradient(160deg,var(--blue),var(--blue-deep));border:2px solid var(--yellow);border-radius:24px;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .modal h2{font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.5rem;text-align:center;margin-bottom:4px}
  .modal .sub{text-align:center;opacity:.85;font-size:.84rem;margin-bottom:16px}
  .rps-panels{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin:14px 0}
  .rps-p{flex:1 1 200px;min-width:160px;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.18);border-radius:16px;padding:14px;text-align:center}
  .rps-p.picked{border-color:var(--gold)} .rps-p.winner{border-color:var(--yellow);background:rgba(232,255,0,.14)}
  .rps-p .pn{font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.15rem;margin-bottom:8px}
  .rps-hand{font-size:3rem;height:54px;line-height:54px}
  .rps-btns{display:flex;gap:8px;justify-content:center;margin-top:6px}
  .rps-btns button{font-size:1.6rem;width:52px;height:52px;border-radius:14px;border:2px solid rgba(255,255,255,.2);background:rgba(0,0,0,.2);cursor:pointer}
  .rps-btns button:disabled{opacity:.35}
  .rps-msg{text-align:center;font-weight:700;color:var(--yellow);min-height:24px;margin-top:6px}
  .pod{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,200,61,.35);border-radius:14px;padding:12px 16px;margin-bottom:9px}
  .pod .medal{font-size:1.6rem} .pod .ptier{font-size:.7rem;letter-spacing:.1em;color:var(--yellow);font-weight:700}
  .pod .pname{font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.4rem} .pod .pamt{margin-left:auto;font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.3rem;color:var(--gold)}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:85;background:var(--ink);border:2px solid var(--yellow);color:var(--cream);padding:11px 20px;border-radius:14px;font-weight:700;opacity:0;transition:.3s;pointer-events:none;text-align:center;max-width:90vw}
  .toast.show{opacity:1}
  .setup-warn{background:rgba(255,77,109,.15);border:1.5px solid var(--win);border-radius:14px;padding:14px;margin-top:16px;font-size:.86rem;line-height:1.5}
  code{background:rgba(0,0,0,.3);padding:1px 6px;border-radius:5px;font-size:.85em}
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div class="wrap">
  <h1 class="display">⚽ 世界杯射门下注<small>NOAH 联机版 · LIVE</small></h1>

  <!-- config warning -->
  <div id="cfgWarn" class="setup-warn hidden">
    ⚠️ 还没填入 Firebase 配置,联机功能无法使用。请按文件顶部的说明,把你 Firebase 项目的配置粘贴进 <code>firebaseConfig</code>,再上线。
  </div>

  <!-- LANDING -->
  <div id="landing">
    <div class="two-choice">
      <div class="choice" id="btnHost"><div class="ic">🖥️</div><div class="t">创建房间</div><div class="d">主持人 · 用电脑/大屏</div></div>
      <div class="choice" id="btnPlayer"><div class="ic">📱</div><div class="t">加入房间</div><div class="d">玩家 · 用手机</div></div>
    </div>
  </div>

  <!-- HOST SETUP -->
  <div id="hostSetup" class="hidden">
    <div class="card">
      <h3>🛠️ 设置比赛</h3>
      <div class="hint" style="margin-bottom:10px">四位球星名字、奖金、下注倒计时。开房后把房间码/二维码投到大屏,玩家扫码进来。</div>
      <div class="setrow"><span class="sw" style="background:var(--c0)"></span><input id="ht0" value="哈兰德"></div>
      <div class="setrow"><span class="sw" style="background:var(--c1)"></span><input id="ht1" value="梅西"></div>
      <div class="setrow"><span class="sw" style="background:var(--c2)"></span><input id="ht2" value="C罗"></div>
      <div class="setrow"><span class="sw" style="background:var(--c3)"></span><input id="ht3" value="姆巴佩"></div>
      <div class="setrow"><label>🥉 三奖</label><input class="num" id="hsp3" type="number" value="200"></div>
      <div class="setrow"><label>🥈 二奖</label><input class="num" id="hsp2" type="number" value="300"></div>
      <div class="setrow"><label>🥇 大奖</label><input class="num" id="hsp1" type="number" value="500"></div>
      <div class="setrow"><label>⏱️ 倒计时</label><input class="num" id="htimer" type="number" value="60"><span class="hint">秒/每轮</span></div>
      <button class="btn btn-go btn-big" id="btnCreate">创建房间 🏁</button>
    </div>
  </div>

  <!-- HOST ROOM -->
  <div id="hostRoom" class="hidden">
    <div class="card" id="hostLobbyCard">
      <h3>📣 房间已开 · 请玩家扫码加入</h3>
      <div class="roomcode" id="roomCodeBig">----</div>
      <div id="qrbox"></div>
      <div class="linkrow"><input id="joinLink" readonly><button class="btn btn-ghost" id="copyLink">复制</button></div>
      <h3 style="margin-top:16px">已进场玩家 <span class="chip" id="lobbyCount">0 人</span></h3>
      <div class="plist" id="lobbyPlayers"></div>
      <button class="btn btn-go btn-big" id="btnStartRound">开始第 1 轮 · 三奖 →</button>
    </div>

    <div class="card hidden" id="hostPlayCard">
      <div class="round-tag" id="hRoundTag"></div>
      <div class="chips" id="hChips"></div>
      <div class="pitch" id="pitch"><div class="goal"></div><div class="box"></div><div class="keeper" id="keeper"></div><div class="banner" id="banner"><b id="bannerText"></b></div></div>
      <div style="margin-top:12px;display:flex;gap:14px;align-items:center;flex-wrap:wrap">
        <div class="countdown" id="hCountdown" style="min-width:90px"></div>
        <div class="hint" id="hPhaseHint" style="flex:1"></div>
        <button class="btn btn-go" id="btnKick">立即开球 ⚽</button>
        <button class="btn btn-go hidden" id="btnNext">下一轮 →</button>
      </div>
      <div class="plist" id="hLocked" style="margin-top:12px"></div>
      <div class="winners" id="hWinners"></div>
    </div>
  </div>

  <!-- PLAYER JOIN -->
  <div id="playerJoin" class="hidden">
    <div class="card">
      <h3>📱 加入房间</h3>
      <div class="field"><label>房间码</label><input id="pjCode" maxlength="6" placeholder="例如 ABCD" style="text-transform:uppercase"></div>
      <div class="field"><label>你的名字</label><input id="pjName" placeholder="例如 小明"></div>
      <div class="field"><label>你手上的卷数</label><input id="pjTk" type="number" min="1" placeholder="例如 10"></div>
      <button class="btn btn-go btn-big" id="btnJoin">进场 🎟️</button>
    </div>
  </div>

  <!-- PLAYER ROOM -->
  <div id="playerRoom" class="hidden">
    <div class="card">
      <div class="round-tag" id="pRoundTag" style="margin-bottom:10px"></div>
      <div id="pBody"></div>
    </div>
  </div>
</div>

<!-- RPS overlay -->
<div id="rpsOverlay" class="overlay hidden"><div class="modal">
  <h2 class="display">✊✋✌️ 猜拳决胜</h2>
  <p class="sub" id="rpsSub"></p>
  <div class="rps-panels" id="rpsPanels"></div>
  <div class="rps-msg" id="rpsMsg"></div>
</div></div>

<!-- Result overlay -->
<div id="resultOverlay" class="overlay hidden"><div class="modal">
  <h2 class="display">🏆 颁奖典礼</h2>
  <p class="sub">三个奖项全部产生</p>
  <div id="podium"></div>
  <button class="btn btn-go btn-big" id="btnAgain">回首页</button>
</div></div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, update, get, onValue, push, remove, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ===================== 1) 在这里粘贴你的 Firebase 配置 ===================== */
const firebaseConfig = {
  apiKey: "AIzaSyBSEY-G-cXr347351FP4OtE5_Q8XEHZ91c",
  authDomain: "noahworldcupgames.firebaseapp.com",
  databaseURL: "https://noahworldcupgames-default-rtdb.firebaseio.com",
  projectId: "noahworldcupgames",
  appId: "1:1043555429611:web:97c01b75553809ea2962ae"
};
/* ====================================================================== */

const cfgOk = !firebaseConfig.databaseURL.startsWith("PASTE_");
let db=null;
if(cfgOk){ try{ const app=initializeApp(firebaseConfig); db=getDatabase(app); }catch(e){ console.error(e); } }

const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const COLORS=['var(--c0)','var(--c1)','var(--c2)','var(--c3)'];

/* ---- Audio ---- */
let actx=null;const AC=()=>actx||(actx=new(window.AudioContext||window.webkitAudioContext)());
function cheer(){try{const c=AC(),t0=c.currentTime;[523,659,784,1047].forEach((fr,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='triangle';o.frequency.value=fr;const t=t0+i*.1;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.2,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+.4);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.45);});}catch(e){}}
function whistle(){try{const c=AC(),t=c.currentTime;const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.setValueAtTime(2200,t);o.frequency.linearRampToValueAtTime(2600,t+.12);g.gain.setValueAtTime(.0001,t);g.gain.linearRampToValueAtTime(.15,t+.03);g.gain.exponentialRampToValueAtTime(.0001,t+.25);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.26);}catch(e){}}

/* ---- Confetti ---- */
const cvs=$('confetti'),cx=cvs.getContext('2d');let parts=[];
function rs(){cvs.width=innerWidth;cvs.height=innerHeight}addEventListener('resize',rs);rs();
function burst(){const cs=['#E8FF00','#FFC83D','#FF4D6D','#10B981','#0EA5E9','#EC4899','#fff'];for(let i=0;i<150;i++)parts.push({x:innerWidth/2,y:innerHeight*.4,vx:(Math.random()-.5)*15,vy:(Math.random()-1)*17-3,g:.32+Math.random()*.2,s:6+Math.random()*7,rot:Math.random()*6,vr:(Math.random()-.5)*.4,c:cs[(Math.random()*cs.length)|0],life:0});}
(function loop(){cx.clearRect(0,0,cvs.width,cvs.height);parts=parts.filter(p=>p.life<170);parts.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.life++;cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot);cx.globalAlpha=Math.max(0,1-p.life/170);cx.fillStyle=p.c;cx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);cx.restore();});requestAnimationFrame(loop);})();

function cuteFace(i){const skins=['#FFD9A8','#F2C28B','#E8B07A','#FFE3C0'],hairs=['#F4C430','#6B4423','#1A1A1A','#8B5A2B'];const skin=skins[i%4],hair=hairs[i%4];let eyes='',mouth='',gl='';
  if(i%4===0){eyes=`<path d="M20 24 q4.5-5 9 0" stroke="#222" stroke-width="2.6" fill="none" stroke-linecap="round"/><path d="M35 24 q4.5-5 9 0" stroke="#222" stroke-width="2.6" fill="none" stroke-linecap="round"/>`;mouth=`<path d="M23 30 q9 13 18 0 Z" fill="#9c1f2b"/><path d="M23 30 q9 4 18 0 Z" fill="#fff"/>`;}
  else if(i%4===1){eyes=`<circle cx="25" cy="24" r="3.4" fill="#222"/><circle cx="39" cy="24" r="3.4" fill="#222"/><circle cx="26.2" cy="22.9" r="1.1" fill="#fff"/><circle cx="40.2" cy="22.9" r="1.1" fill="#fff"/>`;mouth=`<path d="M25 30 q7 6 14 0" stroke="#9c1f2b" stroke-width="2.4" fill="none" stroke-linecap="round"/><path d="M30 31 q1.5 8 4.5 8 q3 0 3-4 l-1-4Z" fill="#e8556d"/>`;}
  else if(i%4===2){gl=`<rect x="17" y="20" width="30" height="9" rx="4.5" fill="#1b1b1b"/><rect x="18" y="20.6" width="12" height="7.6" rx="3.5" fill="#2b6cb0"/><rect x="34" y="20.6" width="12" height="7.6" rx="3.5" fill="#2b6cb0"/><rect x="29" y="23" width="6" height="2" fill="#1b1b1b"/>`;mouth=`<path d="M26 31 q6 5 12 0" stroke="#9c1f2b" stroke-width="2.4" fill="none" stroke-linecap="round"/>`;}
  else{eyes=`<circle cx="25" cy="24" r="4.4" fill="#fff" stroke="#222" stroke-width="1.6"/><circle cx="39" cy="24" r="4.4" fill="#fff" stroke="#222" stroke-width="1.6"/><circle cx="25" cy="24.4" r="2" fill="#222"/><circle cx="39" cy="24.4" r="2" fill="#222"/>`;mouth=`<ellipse cx="32" cy="32" rx="3.4" ry="4.6" fill="#9c1f2b"/>`;}

let HCODE=null,HCFG=null;
function genCode(){const a='ABCDEFGHJKLMNPQRSTUVWXYZ';let s='';for(let i=0;i<4;i++)s+=a[(Math.random()*a.length)|0];return s;}
$('btnCreate').onclick=async()=>{
  if(!guard())return;
  const teams=[0,1,2,3].map(i=>({name:($('ht'+i).value.trim()||('球星'+(i+1)))}));
  const prizes=ORDER.map(o=>({m:o.m,l:o.l,amount:parseInt($(o.key).value)||0}));
  const timer=Math.max(15,parseInt($('htimer').value)||60);
  let code=genCode();
  try{ for(let i=0;i<3;i++){const ex=await get(ref(db,'rooms/'+code));if(!ex.exists())break;code=genCode();} }catch(e){}
  HCODE=code;HCFG={teams,prizes,timer};
  await set(ref(db,'rooms/'+code),{config:{teams,prizes,timer},round:{index:-1,phase:'lobby'},createdAt:serverTimestamp()});
  $('roomCodeBig').textContent=code;
  const link=location.origin+location.pathname+'?room='+code;
  $('joinLink').value=link;
  makeQR(link);
  show('hostRoom');
  hostSubscribe(code);
};
$('copyLink').onclick=()=>{navigator.clipboard?.writeText($('joinLink').value);toast('链接已复制');};
function makeQR(link){const box=$('qrbox');box.innerHTML='';const s=new Image();s.onerror=()=>{box.innerHTML='<div class="hint">二维码加载失败,用上面的链接也可以</div>';};s.src='https://api.qrserver.com/v1/create-qr-code/?size=180x180&data='+encodeURIComponent(link);box.appendChild(s);}

let hostPlayers={},hostBets={},hostRound=null,hostWinners={};
function hostSubscribe(code){
  onValue(ref(db,'rooms/'+code+'/players'),s=>{hostPlayers=s.val()||{};renderLobby();renderHostLocked();});
  onValue(ref(db,'rooms/'+code+'/round'),s=>{hostRound=s.val()||{index:-1,phase:'lobby'};onHostRound();});
  onValue(ref(db,'rooms/'+code+'/winners'),s=>{hostWinners=s.val()||{};renderHostWinners();});
  onValue(ref(db,'rooms/'+code+'/rps'),s=>{hostRps(s.val());});
}
function renderLobby(){
  const ps=Object.entries(hostPlayers);
  $('lobbyCount').textContent=ps.length+' 人';
  $('lobbyPlayers').innerHTML=ps.map(([id,p])=>`<div class="ptag ${p.won?'out':''}">${esc(p.name)}<span class="bal">${p.bal}卷</span></div>`).join('')||'<span class="hint">等待玩家扫码进来…</span>';
  $('btnStartRound').disabled=ps.length===0;
}
$('btnStartRound').onclick=()=>startRound(0);
async function startRound(idx){
  if(idx>=3){ await update(ref(db,'rooms/'+HCODE+'/round'),{phase:'finished'}); return; }
  const deadline=now()+HCFG.timer*1000;
  await update(ref(db,'rooms/'+HCODE+'/round'),{index:idx,phase:'betting',scorer:null,deadline});
}
let hostTimerInt=null,kickFired=false;
function onHostRound(){
  $('hostLobbyCard').classList.toggle('hidden',hostRound.phase==='lobby'?false:true);
  $('hostPlayCard').classList.toggle('hidden',hostRound.phase==='lobby');
  if(hostRound.phase==='lobby')return;
  // subscribe current bets
  onValue(ref(db,'rooms/'+HCODE+'/bets/'+hostRound.index),s=>{hostBets=s.val()||{};renderHostLocked();renderTallies();});
  const prize=HCFG.prizes[hostRound.index];
  if(prize)$('hRoundTag').innerHTML=`第 ${hostRound.index+1} 轮 · <b>${prize.l} RM${prize.amount}</b>`;
  renderHChips();
  if(!$('pitch').querySelector('.shooter')) buildPitch();
  clearInterval(hostTimerInt);
  if(hostRound.phase==='betting'){
    kickFired=false;
    $('btnKick').classList.remove('hidden');$('btnNext').classList.add('hidden');
    $('hPhaseHint').textContent='玩家手机下注中…倒计时结束自动开球,也可手动开球';
    hostTimerInt=setInterval(()=>{
      const left=Math.max(0,Math.ceil((hostRound.deadline-now())/1000));
      $('hCountdown').textContent=left;$('hCountdown').classList.toggle('warn',left<=10);
      if(left<=0&&!kickFired){kickFired=true;clearInterval(hostTimerInt);$('hPhaseHint').textContent='封盘中…';setTimeout(doKick,1200);}
    },250);
  }else if(hostRound.phase==='kicking'){
    $('hCountdown').textContent='';$('btnKick').classList.add('hidden');
    animateKick(hostRound.scorer);
  }else if(hostRound.phase==='resolving'){
    $('hCountdown').textContent='';$('btnKick').classList.add('hidden');
    $('hPhaseHint').textContent='本轮结束。点「下一轮」继续。';
    $('btnNext').classList.toggle('hidden',hostRound.index>=2);
    if(hostRound.index>=2){ setTimeout(showResult,800); }
  }else if(hostRound.phase==='finished'){ showResult(); }
}
$('btnKick').onclick=()=>{ if(hostRound.phase==='betting'&&!kickFired){kickFired=true;clearInterval(hostTimerInt);doKick();} };
$('btnNext').onclick=()=>startRound(hostRound.index+1);
async function doKick(){
  // scorer among teams that have locked bets
  const betTeams=[];for(let i=0;i<4;i++){if(Object.values(hostBets).some(b=>b.alloc&&b.alloc[i]>0))betTeams.push(i);}
  if(betTeams.length===0){ toast('这一轮没有人下注,无法开球');kickFired=false;startRound(hostRound.index);return; }
  const scorer=betTeams[(Math.random()*betTeams.length)|0];
  await update(ref(db,'rooms/'+HCODE+'/round'),{phase:'kicking',scorer});
}
function hostResolveAfterKick(scorer){
  // candidates
  const cands=Object.entries(hostBets).filter(([id,b])=>b.alloc&&b.alloc[scorer]>0).map(([id,b])=>({id,amt:b.alloc[scorer]}));
  const maxAmt=Math.max(...cands.map(c=>c.amt));
  const tied=cands.filter(c=>c.amt===maxAmt);
  // consume tickets for all bettors
  const upd={};
  Object.entries(hostBets).forEach(([id,b])=>{const tot=(b.alloc||[]).reduce((a,x)=>a+x,0);const pl=hostPlayers[id];if(pl)upd['rooms/'+HCODE+'/players/'+id+'/bal']=Math.max(0,(pl.bal||0)-tot);});
  update(ref(db),upd);
  if(tied.length===1){ hostAward(tied[0].id,scorer,maxAmt); }
  else{ set(ref(db,'rooms/'+HCODE+'/rps'),{pids:tied.map(c=>c.id),picks:{},attempt:1,scorer,amt:maxAmt,msg:''}); update(ref(db,'rooms/'+HCODE+'/round'),{phase:'rps'}); }
}
async function hostAward(id,scorer,amt){
  const pl=hostPlayers[id];const prize=HCFG.prizes[hostRound.index];
  const upd={};
  upd['rooms/'+HCODE+'/players/'+id+'/won']=prize.l;
  upd['rooms/'+HCODE+'/winners/'+hostRound.index]={id,name:pl?pl.name:'?',amount:prize.amount,team:scorer,amt,medal:prize.m,label:prize.l};
  upd['rooms/'+HCODE+'/rps']=null;
  await update(ref(db),upd);
  await update(ref(db,'rooms/'+HCODE+'/round'),{phase:'resolving'});
  toast(`🏆 ${pl?pl.name:''} 赢得 ${prize.l} RM${prize.amount}`);
}
// host evaluates RPS when all picked
let rpsEvaluating=false;
function hostRps(rps){
  if(!rps||hostRound?.phase!=='rps'){return;}
  const pids=rps.pids||[];const picks=rps.picks||{};
  if(pids.length&&Object.keys(picks).length===pids.length&&!rpsEvaluating){
    rpsEvaluating=true;
    setTimeout(()=>{evalRps(rps);rpsEvaluating=false;},700);
  }
}
function beats(a,b){return (a==='r'&&b==='s')||(a==='s'&&b==='p')||(a==='p'&&b==='r');}
function evalRps(rps){
  const pids=rps.pids,picks=rps.picks;
  const gs=[...new Set(pids.map(id=>picks[id]))];
  if(gs.length===1||gs.length===3){ update(ref(db,'rooms/'+HCODE+'/rps'),{picks:{},attempt:(rps.attempt||1)+1,msg:'平局,重新猜拳'}); return; }
  const [g1,g2]=gs;const winG=beats(g1,g2)?g1:g2;const adv=pids.filter(id=>picks[id]===winG);
  if(adv.length===1){ hostAward(adv[0],rps.scorer,rps.amt); }
  else{ update(ref(db,'rooms/'+HCODE+'/rps'),{pids:adv,picks:{},attempt:(rps.attempt||1)+1,msg:adv.length+' 人继续猜拳'}); }
}

function buildPitch(){
  $('keeper').innerHTML=keeperFig();const pitch=$('pitch');pitch.querySelectorAll('.shooter,.ball').forEach(e=>e.remove());
  const xs=[10,36.5,63,89.5];const teams=teamObjs(HCFG);
  teams.forEach((t,i)=>{const sh=document.createElement('div');sh.className='shooter';sh.id='sh'+i;sh.style.left=(xs[i]-9)+'%';
    sh.innerHTML=`<div class="fig" style="animation-delay:${i*0.28}s">${playerFig(t)}</div><div class="nameplate">${esc(t.name)}</div><div class="tally" id="tal${i}">0 卷</div>`;pitch.appendChild(sh);
    const b=document.createElement('div');b.className='ball';b.id='ball'+i;b.style.left=xs[i]+'%';b.innerHTML='<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="#fff" stroke="#222"/><path d="M12 5 l4 3 -1.5 5 h-5 L8 8Z" fill="#222"/></svg>';pitch.appendChild(b);});
}
function renderTallies(){for(let i=0;i<4;i++){const s=Object.values(hostBets).reduce((a,b)=>a+((b.alloc&&b.alloc[i])||0),0);const el=$('tal'+i);if(el)el.textContent=s+' 卷';}}
function renderHChips(){$('hChips').innerHTML=HCFG.prizes.map((p,i)=>{const w=hostWinners[i];return `<div class="chip ${w?'found':''}">${p.m}${p.l} <span class="a">${p.amount}</span>${w?' · '+esc(w.name):''}</div>`;}).join('');}
function renderHostLocked(){const ps=hostPlayers;$('hLocked').innerHTML=Object.entries(ps).filter(([id,p])=>!p.won).map(([id,p])=>{const locked=hostBets[id]&&hostBets[id].locked;return `<div class="ptag ${locked?'locked':''}">${esc(p.name)}<span class="bal">${p.bal}卷</span></div>`;}).join('');}
function renderHostWinners(){renderHChips();const ws=Object.values(hostWinners);$('hWinners').innerHTML=ws.map(w=>`<div class="wcard"><div class="l">${w.medal} ${w.label}</div><div class="n">${esc(w.name)}</div><div class="a">RM ${w.amount}</div></div>`).join('');}

let kicked=false;
function animateKick(scorer){
  if(kicked===hostRound.index)return; kicked=hostRound.index; whistle();
  $('keeper').style.left=(scorer<2?70:30)+'%';
  for(let i=0;i<4;i++){const sh=$('sh'+i),ball=$('ball'+i);if(!sh)continue;sh.classList.add('kicking');sh.classList.remove('scorer');
    const fi=i;requestAnimationFrame(()=>{if(fi===scorer){ball.style.top='8%';ball.style.left='50%';ball.style.transform='scale(.7) rotate(720deg)';}else{const off=fi<2?28:72;ball.style.top='11%';ball.style.left=off+'%';ball.style.transform='scale(.6) rotate(540deg)';}});}
  setTimeout(()=>{$('sh'+scorer).classList.add('scorer');$('bannerText').textContent='GOAL! ⚽';$('banner').classList.add('show');cheer();burst();
    const t=teamObjs(HCFG)[scorer];$('hPhaseHint').textContent=`${t.name} 进球!结算中…`;
    setTimeout(()=>{$('banner').classList.remove('show');for(let i=0;i<4;i++)$('sh'+i)?.classList.remove('kicking');hostResolveAfterKick(scorer);resetBalls();},1500);
  },1300);
}
function resetBalls(){const xs=[10,36.5,63,89.5];for(let i=0;i<4;i++){const b=$('ball'+i);if(!b)continue;b.style.transition='none';b.style.top='80%';b.style.left=xs[i]+'%';b.style.transform='none';requestAnimationFrame(()=>b.style.transition='');$('sh'+i)?.classList.remove('scorer');}$('keeper').style.left='50%';}

/* ===================== PLAYER ===================== */
let PCODE=null,PID=null,PCFG=null,pAlloc=[0,0,0,0],pLocked=false,pTimerInt=null,pRound=null,pMe=null;
$('btnJoin').onclick=async()=>{
  if(!guard())return;
  const code=$('pjCode').value.trim().toUpperCase();const name=$('pjName').value.trim();const tk=parseInt($('pjTk').value);
  if(code.length<3){toast('请输入房间码');return;}
  if(!name){toast('请输入名字');return;}
  if(!tk||tk<1){toast('请输入卷数');return;}
  let snap;try{snap=await get(ref(db,'rooms/'+code+'/config'));}catch(e){toast('连接失败');return;}
  if(!snap.exists()){toast('找不到这个房间,检查房间码');return;}
  PCODE=code;PCFG=snap.val();
  const pref=push(ref(db,'rooms/'+code+'/players'));PID=pref.key;
  await set(pref,{name,bal:tk,won:null,joinedAt:serverTimestamp()});
  try{onDisconnect(ref(db,'rooms/'+code+'/players/'+PID+'/connected')).set(false);set(ref(db,'rooms/'+code+'/players/'+PID+'/connected'),true);}catch(e){}
  show('playerRoom');
  playerSubscribe();
};
function playerSubscribe(){
  onValue(ref(db,'rooms/'+PCODE+'/round'),s=>{pRound=s.val()||{phase:'lobby'};renderPlayer();});
  onValue(ref(db,'rooms/'+PCODE+'/players/'+PID),s=>{pMe=s.val()||{};renderPlayer();});
  onValue(ref(db,'rooms/'+PCODE+'/winners'),s=>{pWinners=s.val()||{};});
  onValue(ref(db,'rooms/'+PCODE+'/rps'),s=>{pRps=s.val();renderPlayer();});
}
let pWinners={},pRps=null,pLastPhase=null,pLastRound=-1;
function teamObjsP(){return (PCFG.teams||[]).map((t,i)=>({name:t.name,raw:RAW[i],color:COLORS[i],face:i,photo:DEFAULT_FACES[i]}));}
function renderPlayer(){
  if(!pRound){return;}
  const prize=PCFG.prizes?.[pRound.index];
  $('pRoundTag').innerHTML=prize?`第 ${pRound.index+1} 轮 · <b>${prize.l} RM${prize.amount}</b>`:'等待开始';
  const body=$('pBody');
  // reset alloc on new betting round
  if(pRound.phase==='betting'&&pLastRound!==pRound.index){pLastRound=pRound.index;pAlloc=[0,0,0,0];pLocked=false;}
  if(pMe&&pMe.won){ body.innerHTML=`<div class="bigstatus"><div class="em">🎉</div><div class="tx">你已赢得 ${esc(pMe.won)}!</div><div class="sm">已退场,不再参与后续轮次。坐等颁奖 🏆</div></div>`; clearInterval(pTimerInt); return; }
  if(pRound.phase==='lobby'){ body.innerHTML=`<div class="bigstatus"><div class="em">⏳</div><div class="tx">已进场,等待主持人开始</div><div class="sm">你手上有 ${pMe?pMe.bal:'?'} 卷</div></div>`; return; }
  if(pRound.phase==='betting'){ renderPlayerBet(prize); return; }
  if(pRound.phase==='kicking'){ clearInterval(pTimerInt); body.innerHTML=`<div class="bigstatus"><div class="em">⚽</div><div class="tx">开球中…</div><div class="sm">看大屏!谁会进球?</div></div>`; return; }
  if(pRound.phase==='rps'){ renderPlayerRps(); return; }
  if(pRound.phase==='resolving'||pRound.phase==='finished'){
    const w=pWinners[pRound.index];const mine=w&&w.id===PID;
    body.innerHTML=`<div class="bigstatus"><div class="em">${mine?'🏆':'📣'}</div><div class="tx">${w?esc(w.name)+' 赢得 '+w.label:'本轮结束'}</div><div class="sm">${pRound.phase==='finished'?'全部结束,看大屏颁奖':'等待主持人开下一轮'}</div></div>`;
    clearInterval(pTimerInt); if(pRound.phase==='finished'){setTimeout(showResult,600);} return;
  }
}
function renderPlayerBet(prize){
  const teams=teamObjsP();const used=pAlloc.reduce((a,b)=>a+b,0);const remain=(pMe?pMe.bal:0)-used;
  const body=$('pBody');
  if(pLocked){ body.innerHTML=`<div class="bigstatus"><div class="em">✅</div><div class="tx">下注已锁定</div><div class="sm">${pAlloc.map((a,i)=>a>0?esc(teams[i].name)+' '+a+'卷':'').filter(Boolean).join(' · ')||'这轮没押'}</div><div class="sm">等倒计时结束开球…</div></div>`; return; }
  body.innerHTML=`
    <div class="countdown" id="pTimer" style="margin-bottom:6px"></div>
    <div class="remain">剩余可押 <b>${remain}</b> 卷</div>
    <div class="pstars">${teams.map((t,i)=>`<div class="pstar" style="border-color:${t.color}"><div class="sfig">${playerFig(t)}</div><div class="sname">${esc(t.name)}</div><div class="alloc" id="pal${i}">${pAlloc[i]}</div><div class="albl">已押</div><div class="stepper"><button class="minus" data-m="${i}">−</button><button class="plus" data-p="${i}">＋</button><button class="plus5" data-p5="${i}">＋5</button></div></div>`).join('')}</div>
    <button class="btn btn-go btn-big" id="pLockBtn">锁定下注 ✓</button>
    <div class="hint" style="text-align:center;margin-top:6px">押过的卷会被消耗,没押的留到下一轮</div>`;
  body.querySelectorAll('[data-p]').forEach(b=>b.onclick=()=>pAdj(+b.dataset.p,1));
  body.querySelectorAll('[data-p5]').forEach(b=>b.onclick=()=>pAdj(+b.dataset.p5,5));
  body.querySelectorAll('[data-m]').forEach(b=>b.onclick=()=>pAdj(+b.dataset.m,-1));
  $('pLockBtn').onclick=()=>lockBet();
  startPTimer();
}
function pAdj(i,d){const used=pAlloc.reduce((a,b)=>a+b,0);const remain=(pMe?pMe.bal:0)-used;
  if(d>0){const add=Math.min(d,remain);if(add<=0){toast('卷不够了');return;}pAlloc[i]+=add;}else{pAlloc[i]=Math.max(0,pAlloc[i]+d);}
  $('pal'+i).textContent=pAlloc[i];const nu=pAlloc.reduce((a,b)=>a+b,0);const nr=(pMe?pMe.bal:0)-nu;document.querySelector('.remain b').textContent=nr;}
function startPTimer(){clearInterval(pTimerInt);pTimerInt=setInterval(()=>{const left=Math.max(0,Math.ceil((pRound.deadline-now())/1000));const el=$('pTimer');if(el){el.textContent=left+' 秒';el.classList.toggle('warn',left<=10);}if(left<=0){clearInterval(pTimerInt);if(!pLocked)lockBet(true);}},250);}
async function lockBet(auto){
  if(pLocked)return;pLocked=true;clearInterval(pTimerInt);
  try{await set(ref(db,'rooms/'+PCODE+'/bets/'+pRound.index+'/'+PID),{alloc:pAlloc.slice(),locked:true});}catch(e){}
  if(auto)toast('时间到,已自动锁定');renderPlayer();
}
function renderPlayerRps(){
  const body=$('pBody');
  const inIt=pRps&&pRps.pids&&pRps.pids.includes(PID);
  if(!inIt){ body.innerHTML=`<div class="bigstatus"><div class="em">✊✋✌️</div><div class="tx">平手!猜拳决胜进行中</div><div class="sm">看大屏围观</div></div>`; return; }
  const mine=pRps.picks&&pRps.picks[PID];
  body.innerHTML=`<div class="bigstatus"><div class="em">✊✋✌️</div><div class="tx">平手!出拳决胜</div><div class="sm">${pRps.msg||'选一个,和对手比'}</div></div>
    <div class="rps-btns" style="margin-top:6px">${['r','p','s'].map(g=>`<button data-g="${g}" ${mine?'disabled':''} style="font-size:2rem;width:64px;height:64px">${({r:'✊',p:'✋',s:'✌️'})[g]}</button>`).join('')}</div>
    ${mine?'<div class="rps-msg">已出招,等对手…</div>':''}`;
  if(!mine)body.querySelectorAll('[data-g]').forEach(b=>b.onclick=async()=>{try{await set(ref(db,'rooms/'+PCODE+'/rps/picks/'+PID),b.dataset.g);}catch(e){}renderPlayer();});
}

/* ===================== Result (shared) ===================== */
function showResult(){
  const wins = HCODE?hostWinners:pWinners; const cfg = HCFG||PCFG;
  if(!cfg)return;
  const ordered=[0,1,2].map(i=>({i,w:wins[i],p:cfg.prizes[i]})).reverse();
  $('podium').innerHTML=ordered.map(o=>`<div class="pod"><span class="medal">${o.p.m}</span><div><div class="ptier">${o.p.l}</div><div class="pname">${esc(o.w?o.w.name:'—')}</div></div><span class="pamt">RM ${o.p.amount}</span></div>`).join('');
  $('resultOverlay').classList.remove('hidden');burst();setTimeout(burst,400);
}
$('btnAgain').onclick=()=>location.href=location.origin+location.pathname;
</script>
</body>
</html>
